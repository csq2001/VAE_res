<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分块 VAE-Residual DNA 编码与纠错</title>
  <style>
    :root {
      --ink: #15251f; --muted: #66746e; --paper: #f4f1e8; --card: #fffdf7;
      --green: #126b55; --lime: #b6e36f; --orange: #ef7d45; --line: #d9ddd2;
      --shadow: 0 18px 50px rgba(34, 57, 48, .11);
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--paper); font: 15px/1.5 Inter, "Microsoft YaHei", sans-serif; }
    body::before { content:""; position:fixed; inset:0; z-index:-1; opacity:.5; background:
      radial-gradient(circle at 10% 10%, #d9edc1 0, transparent 27%),
      radial-gradient(circle at 90% 25%, #f7ceb5 0, transparent 25%); }
    .shell { width: min(1480px, calc(100% - 32px)); margin: 24px auto 60px; }
    header { display:flex; justify-content:space-between; align-items:end; gap:24px; margin-bottom:20px; }
    h1 { margin:0; max-width:800px; font: 700 clamp(28px,4vw,54px)/1.03 Georgia, serif; letter-spacing:-1.5px; }
    .eyebrow { color:var(--green); font-weight:800; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
    .device { background:var(--ink); color:white; padding:8px 13px; border-radius:99px; white-space:nowrap; }
    .layout { display:grid; grid-template-columns:330px 1fr; gap:18px; align-items:start; }
    .panel { background:rgba(255,253,247,.92); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
    aside { padding:20px; position:sticky; top:18px; }
    h2 { margin:0 0 14px; font-size:18px; }
    .control { margin:0 0 12px; }
    label { display:block; color:var(--muted); font-size:12px; font-weight:800; margin-bottom:5px; }
    select,input { width:100%; border:1px solid #ccd3c9; background:white; color:var(--ink); border-radius:10px; padding:9px 10px; font:inherit; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button { width:100%; border:0; border-radius:12px; padding:13px; color:white; background:var(--green); font-weight:850; font-size:15px; cursor:pointer; }
    button:hover { filter:brightness(1.08); } button:disabled { opacity:.55; cursor:wait; }
    .hint { color:var(--muted); font-size:12px; margin:12px 0 0; }
    main { min-width:0; }
    .status { padding:14px 17px; margin-bottom:18px; display:flex; justify-content:space-between; gap:15px; }
    .status.error { border-color:#e59072; color:#8f3216; }
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(130px,1fr)); gap:10px; margin-bottom:18px; }
    .metric { padding:16px; min-height:104px; }
    .metric small { display:block; color:var(--muted); font-weight:750; }
    .metric strong { display:block; margin-top:7px; font:700 25px/1.1 Georgia,serif; word-break:break-word; }
    .metric span { color:var(--muted); font-size:12px; }
    .section { padding:19px; margin-bottom:18px; }
    .images { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
    figure { margin:0; border:1px solid var(--line); border-radius:14px; overflow:hidden; background:#202923; }
    figure img { display:block; width:100%; aspect-ratio:1/1; object-fit:contain; image-rendering:auto; }
    figcaption { background:var(--card); padding:10px 12px; font-weight:750; }
    .dna-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    pre { margin:0; min-height:150px; max-height:260px; overflow:auto; padding:14px; border-radius:12px; background:#17251f; color:#cbeaa0; white-space:pre-wrap; word-break:break-all; font:12px/1.65 Consolas,monospace; }
    .success { color:var(--green); font-weight:850; } .failure { color:#ae3b1b; font-weight:850; }
    .empty { padding:70px 20px; text-align:center; color:var(--muted); }
    @media(max-width:950px){ .layout{grid-template-columns:1fr} aside{position:static}.metrics{grid-template-columns:repeat(2,1fr)} }
    @media(max-width:560px){ header{align-items:start;flex-direction:column}.images,.dna-grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.shell{width:min(100% - 18px,1480px)} }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div><div class="eyebrow">VAE · Residual · DNA</div><h1>把错误放进序列里，看看图像能不能回来。</h1></div>
    <div class="device" id="device">正在连接服务…</div>
  </header>
  <div class="layout">
    <aside class="panel">
      <h2>编码与信道参数</h2>
      <div class="control"><label for="image">输入图像</label><select id="image"></select></div>
      <div class="control"><label for="checkpoint">模型检查点</label><select id="checkpoint"></select></div>
      <div class="row">
        <div class="control"><label>VAE编码范围</label><input value="整图（自动pad到8倍数）" disabled></div>
        <div class="control"><label for="residual_tile_size">残差 Tile</label><select id="residual_tile_size"><option>8</option><option selected>16</option><option>32</option></select></div>
      </div>
      <div class="row">
        <div class="control"><label for="latent_spatial_size">Latent 空间 Tile</label><select id="latent_spatial_size"><option>2</option><option selected>4</option><option>8</option></select></div>
        <div class="control"><label for="latent_channel_group">Latent 通道组</label><select id="latent_channel_group"><option>16</option><option selected>32</option><option>64</option></select></div>
      </div>
      <div class="row">
        <div class="control"><label for="tau">τ</label><input id="tau" type="number" min="0" max="64" value="5"></div>
        <div class="control"><label for="residual_codec">Tile 压缩</label><select id="residual_codec"><option value="zlib">zlib</option></select></div>
      </div>
      <div class="row">
        <div class="control"><label for="substitution_rate">替换率</label><input id="substitution_rate" type="number" min="0" max=".25" step=".0000001" value="0.000001"></div>
        <div class="control"><label for="insertion_rate">插入率</label><input id="insertion_rate" type="number" min="0" max=".25" step=".0000001" value="0.0000005"></div>
      </div>
      <div class="row">
        <div class="control"><label for="deletion_rate">删除率</label><input id="deletion_rate" type="number" min="0" max=".25" step=".0000001" value="0.0000005"></div>
        <div class="control"><label for="seed">随机种子</label><input id="seed" type="number" min="0" value="42"></div>
      </div>
      <button id="run">压缩、加错并纠错解码</button>
      <p class="hint">Latent使用完整编辑内码、CRC和RS(8+3)；高能量残差保留编辑内码，低能量残差使用紧凑payload+CRC，失败后局部q=0。</p>
    </aside>
    <main>
      <div class="status panel" id="status"><span>选择参数后开始实验。</span><span>—</span></div>
      <div id="results"><div class="panel empty">等待第一次编码。</div></div>
    </main>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const fmt = n => n == null ? "∞" : Number(n).toLocaleString(undefined,{maximumFractionDigits:5});
const value = id => $(id).value;
const metric = (title, main, sub="") => `<div class="metric panel"><small>${title}</small><strong>${main}</strong><span>${sub}</span></div>`;

async function init(){
  try {
    const cfg = await fetch("/api/config").then(r=>r.json());
    $("device").textContent = `计算设备 · ${cfg.device.toUpperCase()}`;
    $("image").innerHTML = cfg.images.map(x=>`<option value="${x.path}">[${x.split}] ${x.name}</option>`).join("");
    $("checkpoint").innerHTML = cfg.checkpoints.map(x=>`<option value="${x}">${x}</option>`).join("");
    $("checkpoint").value = cfg.defaults.checkpoint;
    if(!cfg.images.length || !cfg.checkpoints.length) $("status").innerHTML="<span>未找到图像或 checkpoint。</span><span>配置不完整</span>";
  } catch(e) { showError(`无法连接后端：${e.message}`); }
}
function showError(message){
  $("status").className="status panel error";
  $("status").innerHTML=`<span>${message}</span><span>失败</span>`;
}
function parameters(){
  return {
    image:value("image"), checkpoint:value("checkpoint"),
    tau:+value("tau"), residual_tile_size:+value("residual_tile_size"), residual_codec:value("residual_codec"),
    latent_spatial_size:+value("latent_spatial_size"), latent_channel_group:+value("latent_channel_group"),
    substitution_rate:+value("substitution_rate"), insertion_rate:+value("insertion_rate"),
    deletion_rate:+value("deletion_rate"), seed:+value("seed")
  };
}
function render(r){
  const c=r.compression, ch=r.channel, rec=r.recovery, q=r.quality, timing=r.timing;
  $("status").className=`status panel ${r.ok?"":"error"}`;
  $("status").innerHTML=`<span class="${r.ok?"success":"failure"}">${r.ok?"纠错解码成功":"纠错能力已被超过"}</span><span>${timing.total_seconds}s · ${r.image.width}×${r.image.height}</span>`;
  const decoded = q.decoded || {};
  $("results").innerHTML=`
    <div class="metrics">
      ${metric("VAE编码","整图一次",`${r.image.width} × ${r.image.height}`)}
      ${metric("Payload",`${fmt(c.payload_bytes)} B`,`${fmt(c.payload_bpp)} bit/pixel`)}
      ${metric("最终 DNA",`${fmt(c.dna_nt)} nt`,`${fmt(c.dna_nt_per_pixel)} nt/pixel`)}
      ${metric("DNA 压缩率",`${fmt(c.dna_compression_ratio)} : 1`,`${fmt(c.dna_percent_of_raw)}% of raw DNA`)}
      ${metric("独立 DNA Tile",c.packets,`${rec.latent_tiles} latent + ${rec.residual_tiles} residual`)}
      ${metric("碱基错误",ch.total_errors,`${ch.substitutions} S · ${ch.insertions} I · ${ch.deletions} D`)}
      ${metric("检测到的 erasure",rec.erasures,`${ch.damaged_packets} 条序列被注入错误`)}
      ${metric("Latent 内码纠错",rec.corrected_latent_tiles,`${rec.corrected_latent_codewords} 个 S/I/D 码字`)}
      ${metric("Latent RS 恢复",rec.rs_recovered_packets,"RS(8 data + 3 parity)")}
      ${metric("丢弃 Latent Tile",rec.dropped_latent_tiles,"使用先验 latent 局部降级")}
      ${metric("残差地址纠错",rec.corrected_residual_tiles,`${rec.corrected_residual_codewords} 个地址码字`)}
      ${metric("丢弃残差 Tile",rec.dropped_residual_tiles,`${fmt(rec.degraded_pixel_percent)}% 像素退化为 x̃`)}
      ${metric("无错重建 PSNR",`${fmt(q.clean.psnr)} dB`,`maxerr ${fmt(q.clean.maxerr)}`)}
      ${metric("纠错后 PSNR",r.ok?`${fmt(decoded.psnr)} dB`:"无法解码",r.ok?`maxerr ${fmt(decoded.maxerr)}`:(r.decode_error||""))}
      ${metric("Latent / Residual",`${fmt(c.latent_bytes)} / ${fmt(c.residual_bytes)}`,"bytes（RS/Marker 前）")}
      ${metric("运行时间",`${timing.total_seconds}s`,`encode ${timing.encode_seconds}s · decode ${timing.decode_seconds}s`)}
    </div>
    <section class="section panel"><h2>重建结果</h2><div class="images">
      <figure><img src="${r.images.original}"><figcaption>原图</figcaption></figure>
      <figure><img src="${r.images.clean}"><figcaption>无信道错误的分块重建</figcaption></figure>
      ${r.ok?`<figure><img src="${r.images.decoded}"><figcaption>Latent/残差 IDS 内码后重建</figcaption></figure>
      <figure><img src="${r.images.error}"><figcaption>绝对误差热力图（按本次峰值归一化）</figcaption></figure>`:
      `<div class="empty"><strong>解码失败</strong><br>${r.decode_error||"未知错误"}</div>`}
    </div></section>
    <section class="section panel"><h2>首个 ${r.dna_preview.packet_stream} packet · DNA 片段</h2><div class="dna-grid">
      <div><label>信道前</label><pre>${r.dna_preview.original}</pre></div>
      <div><label>信道后</label><pre>${r.dna_preview.mutated}</pre></div>
    </div></section>`;
}
$("run").addEventListener("click",async()=>{
  $("run").disabled=true; $("run").textContent="模型正在工作…";
  $("status").className="status panel"; $("status").innerHTML="<span>分块编码、注入 IDS 错误并执行恢复…</span><span>请稍候</span>";
  try {
    const response=await fetch("/api/evaluate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(parameters())});
    const data=await response.json();
    if(!response.ok || data.error) throw new Error(data.error||`HTTP ${response.status}`);
    render(data);
  } catch(e){ showError(e.message); }
  finally { $("run").disabled=false; $("run").textContent="压缩、加错并纠错解码"; }
});
init();
</script>
</body>
</html>
