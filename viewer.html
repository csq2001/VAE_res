<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VAE Residual DNA Codec Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6875;
      --line: #d8dde5;
      --accent: #0b6bcb;
      --ok: #107c41;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      padding: 20px 28px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }
    main { padding: 18px 28px 28px; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) minmax(220px, 1.2fr) 100px 120px;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    select, input, button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 10px;
      margin: 14px 0 18px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .metric strong { font-size: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .image-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .image-panel h2 {
      margin: 0;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      font-weight: 650;
    }
    .image-wrap {
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      background: #111;
    }
    .image-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: #b42318; }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>VAE Residual DNA Codec Viewer</h1>
  </header>
  <main>
    <div class="toolbar">
      <label>Checkpoint
        <select id="checkpoint"></select>
      </label>
      <label>Image
        <select id="image"></select>
      </label>
      <label>Tau
        <input id="tau" type="number" min="0" max="16" value="2">
      </label>
      <button id="run">Evaluate</button>
    </div>
    <div id="status" class="status"></div>
    <section class="metrics">
      <div class="metric"><span>PSNR</span><strong id="psnr">-</strong></div>
      <div class="metric"><span>MS-SSIM</span><strong id="msssim">-</strong></div>
      <div class="metric"><span>Max Error</span><strong id="maxerr">-</strong></div>
      <div class="metric"><span>Total bpp</span><strong id="bpp">-</strong></div>
      <div class="metric"><span>Latent bpp</span><strong id="latent">-</strong></div>
      <div class="metric"><span>Residual bpp</span><strong id="residual">-</strong></div>
    </section>
    <section class="grid">
      <article class="image-panel">
        <h2>Input</h2>
        <div class="image-wrap"><img id="input" alt=""></div>
      </article>
      <article class="image-panel">
        <h2>Lossy Approximation</h2>
        <div class="image-wrap"><img id="lossy" alt=""></div>
      </article>
      <article class="image-panel">
        <h2>Near-lossless Reconstruction</h2>
        <div class="image-wrap"><img id="recon" alt=""></div>
      </article>
    </section>
  </main>
  <script>
    const checkpoint = document.getElementById("checkpoint");
    const image = document.getElementById("image");
    const tau = document.getElementById("tau");
    const run = document.getElementById("run");
    const statusBox = document.getElementById("status");

    function setStatus(text, type = "") {
      statusBox.textContent = text;
      statusBox.className = `status ${type}`;
    }

    async function loadOptions() {
      const [ckptRes, imageRes] = await Promise.all([
        fetch("/api/checkpoints"),
        fetch("/api/images")
      ]);
      const ckpts = await ckptRes.json();
      const images = await imageRes.json();
      checkpoint.innerHTML = ckpts.checkpoints.map(path => `<option value="${path}">${path}</option>`).join("");
      image.innerHTML = images.images.map(item => `<option value="${item.path}">${item.split}/${item.name}</option>`).join("");
      if (!ckpts.checkpoints.length) setStatus("No checkpoint found in outputs/checkpoints.", "error");
      else if (!images.images.length) setStatus("No image found in data/train, data/val, or data/test.", "error");
      else setStatus("Ready.", "ok");
    }

    async function evaluate() {
      run.disabled = true;
      setStatus("Running inference...");
      try {
        const url = `/api/evaluate?checkpoint=${encodeURIComponent(checkpoint.value)}&image=${encodeURIComponent(image.value)}&tau=${encodeURIComponent(tau.value)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || "Evaluation failed");
        document.getElementById("psnr").textContent = data.metrics.psnr.toFixed(2);
        document.getElementById("msssim").textContent = data.metrics.ms_ssim.toFixed(4);
        document.getElementById("maxerr").textContent = data.metrics.max_error.toFixed(0);
        document.getElementById("bpp").textContent = data.metrics.total_bpp.toFixed(4);
        document.getElementById("latent").textContent = data.metrics.latent_bpp.toFixed(4);
        document.getElementById("residual").textContent = data.metrics.residual_bpp.toFixed(4);
        document.getElementById("input").src = data.images.input;
        document.getElementById("lossy").src = data.images.lossy;
        document.getElementById("recon").src = data.images.reconstruction;
        setStatus(`Done on ${data.device}.`, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        run.disabled = false;
      }
    }

    run.addEventListener("click", evaluate);
    loadOptions();
  </script>
</body>
</html>
